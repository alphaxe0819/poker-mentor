// ═══════ MIND MAP RENDERER ═══════
const svg = document.getElementById('mindmap');
const ns = 'http://www.w3.org/2000/svg';
const tooltip = document.getElementById('tooltip');

let viewX = 0, viewY = 0, viewScale = 1;
let dragging = false, dragStartX, dragStartY;
let rootGroup;

// Flatten tree with positions
function layoutTree(node, depth = 0, index = 0, siblingCount = 1, angleStart = 0, angleEnd = 2 * Math.PI) {
  const items = [];

  if (depth === 0) {
    node.x = 0;
    node.y = 0;
    node.depth = 0;
    node._collapsed = false;
    items.push(node);
  }

  if (node.children && !node._collapsed) {
    const count = node.children.length;
    const aStep = (angleEnd - angleStart) / count;

    node.children.forEach((child, i) => {
      const angle = angleStart + aStep * i + aStep / 2;
      const radius = depth === 0 ? 280 : (180 + Math.max(0, 2 - depth) * 40);

      child.x = node.x + Math.cos(angle) * radius;
      child.y = node.y + Math.sin(angle) * radius;
      child.depth = depth + 1;
      child.parent = node;
      child._angle = angle;
      if (child._collapsed === undefined) child._collapsed = depth >= 2;

      items.push(child);

      const spreadAngle = Math.min(aStep, Math.PI * 0.6);
      items.push(...layoutTree(child, depth + 1, i, count, angle - spreadAngle / 2, angle + spreadAngle / 2));
    });
  }

  return items;
}

function getNodeRadius(node) {
  if (node.depth === 0) return 60;
  if (node.depth === 1) return 44;
  if (node.depth === 2) return 36;
  return 28;
}

function truncateText(text, maxLen) {
  return text.length > maxLen ? text.substring(0, maxLen) + '...' : text;
}

function render() {
  // Clear
  while (svg.firstChild) svg.removeChild(svg.firstChild);

  // Create root group for pan/zoom
  rootGroup = document.createElementNS(ns, 'g');
  rootGroup.setAttribute('id', 'rootGroup');
  svg.appendChild(rootGroup);

  const items = layoutTree(data);

  // Draw links first
  items.forEach(node => {
    if (node.parent) {
      const link = document.createElementNS(ns, 'path');
      const px = node.parent.x, py = node.parent.y;
      const nx = node.x, ny = node.y;
      const mx = (px + nx) / 2, my = (py + ny) / 2;

      // Curved path
      link.setAttribute('d', `M ${px} ${py} Q ${mx + (ny-py)*0.15} ${my - (nx-px)*0.15} ${nx} ${ny}`);
      link.setAttribute('class', 'link');
      link.setAttribute('stroke', node.color || '#475569');
      link.setAttribute('stroke-width', Math.max(1.5, 4 - node.depth));
      link.setAttribute('stroke-opacity', Math.max(0.2, 0.6 - node.depth * 0.12));
      rootGroup.appendChild(link);
    }
  });

  // Draw nodes
  items.forEach(node => {
    const g = document.createElementNS(ns, 'g');
    g.setAttribute('class', 'node-group');
    g.setAttribute('transform', `translate(${node.x}, ${node.y})`);

    const r = getNodeRadius(node);
    const hasChildren = node.children && node.children.length > 0;

    // Glow effect for depth 0-1
    if (node.depth <= 1) {
      const glow = document.createElementNS(ns, 'circle');
      glow.setAttribute('r', r + 8);
      glow.setAttribute('fill', node.color || '#e94560');
      glow.setAttribute('opacity', '0.15');
      glow.setAttribute('filter', 'blur(8px)');
      g.appendChild(glow);
    }

    // Background circle
    const circle = document.createElementNS(ns, 'circle');
    circle.setAttribute('class', 'node-bg');
    circle.setAttribute('r', r);

    if (node.depth === 0) {
      circle.setAttribute('fill', '#e94560');
    } else {
      circle.setAttribute('fill', '#1e293b');
      circle.setAttribute('stroke', node.color || '#475569');
      circle.setAttribute('stroke-width', node.depth <= 1 ? 2.5 : 1.5);
    }
    g.appendChild(circle);

    // Collapse indicator
    if (hasChildren && node.depth > 0) {
      const badge = document.createElementNS(ns, 'circle');
      badge.setAttribute('cx', r * 0.7);
      badge.setAttribute('cy', -r * 0.7);
      badge.setAttribute('r', 8);
      badge.setAttribute('fill', node._collapsed ? '#e94560' : '#059669');
      g.appendChild(badge);

      const badgeText = document.createElementNS(ns, 'text');
      badgeText.setAttribute('x', r * 0.7);
      badgeText.setAttribute('y', -r * 0.7 + 4);
      badgeText.setAttribute('text-anchor', 'middle');
      badgeText.setAttribute('fill', '#fff');
      badgeText.setAttribute('font-size', '10');
      badgeText.setAttribute('font-weight', '700');
      badgeText.setAttribute('pointer-events', 'none');
      badgeText.textContent = node._collapsed ? `+${node.children.length}` : '−';
      g.appendChild(badgeText);
    }

    // Icon
    if (node.icon) {
      const icon = document.createElementNS(ns, 'text');
      icon.setAttribute('text-anchor', 'middle');
      icon.setAttribute('dominant-baseline', 'middle');
      icon.setAttribute('y', node.depth === 0 ? -8 : (node.depth <= 2 ? -6 : 0));
      icon.setAttribute('font-size', node.depth === 0 ? 24 : (node.depth === 1 ? 18 : 14));
      icon.setAttribute('pointer-events', 'none');
      icon.textContent = node.icon;
      g.appendChild(icon);
    }

    // Text
    const text = document.createElementNS(ns, 'text');
    text.setAttribute('class', 'node-text');
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('dominant-baseline', 'middle');
    const maxLen = node.depth === 0 ? 16 : (node.depth === 1 ? 10 : (node.depth === 2 ? 8 : 7));
    text.textContent = truncateText(node.name, maxLen);

    if (node.depth === 0) {
      text.setAttribute('y', 16);
      text.setAttribute('font-size', '13');
      text.setAttribute('font-weight', '900');
    } else if (node.depth === 1) {
      text.setAttribute('y', node.icon ? 14 : 0);
      text.setAttribute('font-size', '11');
      text.setAttribute('font-weight', '700');
    } else if (node.depth === 2) {
      text.setAttribute('y', node.icon ? 12 : 0);
      text.setAttribute('font-size', '10');
      text.setAttribute('font-weight', '500');
    } else {
      text.setAttribute('y', node.icon ? 0 : 0);
      text.setAttribute('font-size', '9');
      text.setAttribute('font-weight', '400');
      text.setAttribute('fill', 'rgba(255,255,255,0.8)');
    }
    g.appendChild(text);

    // Outer label for small nodes without icon
    if (node.depth >= 3 && !node.icon) {
      text.setAttribute('y', 1);
    }

    // Events
    g.addEventListener('click', (e) => {
      e.stopPropagation();
      if (hasChildren) {
        node._collapsed = !node._collapsed;
        render();
        applyTransform();
      }
    });

    g.addEventListener('mouseenter', (e) => {
      if (node.desc || node.name.length > maxLen) {
        const tt = document.getElementById('tooltip');
        tt.innerHTML = `
          <h4>${node.icon || ''} ${node.name}</h4>
          ${node.desc ? `<div style="color:rgba(255,255,255,0.6)">${node.desc}</div>` : ''}
          ${hasChildren ? `<div style="margin-top:6px;color:rgba(255,255,255,0.4);font-size:11px">${node._collapsed ? 'Click to expand' : 'Click to collapse'} · ${node.children.length} items</div>` : ''}
        `;
        tt.style.left = (e.clientX + 16) + 'px';
        tt.style.top = (e.clientY + 16) + 'px';
        tt.classList.add('show');
      }
    });

    g.addEventListener('mouseleave', () => {
      tooltip.classList.remove('show');
    });

    rootGroup.appendChild(g);
  });

  applyTransform();
}

function applyTransform() {
  if (rootGroup) {
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;
    rootGroup.setAttribute('transform',
      `translate(${cx + viewX}, ${cy + viewY}) scale(${viewScale})`
    );
  }
}

// ═══════ PAN & ZOOM ═══════
svg.addEventListener('mousedown', (e) => {
  if (e.target === svg || e.target.tagName === 'path') {
    dragging = true;
    dragStartX = e.clientX - viewX;
    dragStartY = e.clientY - viewY;
  }
});

window.addEventListener('mousemove', (e) => {
  if (dragging) {
    viewX = e.clientX - dragStartX;
    viewY = e.clientY - dragStartY;
    applyTransform();
  }
  // Update tooltip position
  if (tooltip.classList.contains('show')) {
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top = (e.clientY + 16) + 'px';
  }
});

window.addEventListener('mouseup', () => { dragging = false; });

svg.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  viewScale = Math.max(0.2, Math.min(3, viewScale * delta));
  applyTransform();
}, { passive: false });

// ═══════ CONTROLS ═══════
function resetView() {
  viewX = 0; viewY = 0; viewScale = 1;
  applyTransform();
}

function setCollapse(node, collapsed, minDepth) {
  if (node.children) {
    if (node.depth >= minDepth) node._collapsed = collapsed;
    node.children.forEach(c => setCollapse(c, collapsed, minDepth));
  }
}

function expandAll() {
  setCollapse(data, false, 0);
  render();
}

function collapseAll() {
  setCollapse(data, true, 2);
  render();
}

// ═══════ INIT ═══════
window.addEventListener('resize', applyTransform);
render();
</script>
</body>
</html>
